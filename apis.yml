aid: national-capital-planning-commission
name: National Capital Planning Commission
description: >-
  The National Capital Planning Commission is the federal government's planning
  agency for the National Capital Region. The Commission works with federal
  agencies to preserve and enhance the historical, cultural, and natural
  resources and federal assets of the National Capital Region. No public
  developer API has been identified at this time; available access is through
  the public website, project search, and FOIA.
